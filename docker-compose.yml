services:
  web:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    restart: unless-stopped

  web-dev:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - winterwatch-node-modules:/app/node_modules

volumes:
  winterwatch-node-modules:
